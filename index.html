<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABC Logistics | Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #f0f4f8; 
            --card-bg: #ffffff;  
            --text-main: #102a43; 
            --text-muted: #627d98; 
            --accent: #3e8ed0; 
            --accent-hover: #2178c0;
            --border: #d9e2ec; 
            --danger: #d64545; 
            --danger-hover: #b83232;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.5;
        }

        nav {
            background-color: var(--card-bg);
            padding: 1rem 5%;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 1px 3px rgba(16, 42, 67, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        nav h1 { margin: 0; font-size: 1.25rem; color: var(--text-main); font-weight: 700; letter-spacing: -0.5px;}
        nav h1 span { color: var(--accent); }
        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            margin-left: 2rem;
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.2s;
        }
        .nav-links a:hover, .nav-links a.active { color: var(--accent); }
        
        .container { max-width: 1100px; margin: 2rem auto; padding: 0 1.5rem; }
        
        .grid { display: grid; grid-template-columns: 1fr; gap: 2rem; }
        @media (min-width: 768px) {
            .grid { grid-template-columns: 1fr 2fr; }
        }

        .card {
            background-color: var(--card-bg);
            padding: 1.75rem;
            border-radius: 10px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 12px rgba(16, 42, 67, 0.03);
        }
        h2 { margin-top: 0; font-size: 1.15rem; border-bottom: 1px solid var(--border); padding-bottom: 0.75rem; color: var(--text-main); font-weight: 600;}
        
        .form-group { margin-bottom: 1.25rem; }
        label { display: block; margin-bottom: 0.4rem; color: var(--text-muted); font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;}
        input {
            width: 100%; padding: 0.65rem 0.8rem; box-sizing: border-box;
            background-color: #f8fbfa; border: 1px solid var(--border);
            color: var(--text-main); border-radius: 6px; font-family: 'Inter', sans-serif;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(62, 142, 208, 0.15); background-color: #fff;}
        
        button {
            width: 100%; padding: 0.75rem; background-color: var(--accent);
            color: #ffffff; border: none; border-radius: 6px; font-weight: 600; font-size: 0.95rem;
            cursor: pointer; transition: background-color 0.2s, transform 0.1s;
            font-family: 'Inter', sans-serif;
        }
        button:hover { background-color: var(--accent-hover); }
        button:active { transform: translateY(1px); }
        .btn-danger { background-color: var(--danger); margin-top: 1rem; }
        .btn-danger:hover { background-color: var(--danger-hover); }
        
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 0.5rem; }
        th, td { padding: 1rem 0.75rem; text-align: left; border-bottom: 1px solid var(--border); font-size: 0.95rem;}
        th { color: var(--text-muted); font-weight: 600; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.5px; }
        td { color: var(--text-main); }
        tr:last-child td { border-bottom: none; }
        
        .error { background-color: #ffeaea; color: var(--danger); font-size: 0.85rem; padding: 0.75rem; border-radius: 6px; margin-bottom: 1rem; display: none; border: 1px solid #fecaca;}
        .empty-state { text-align: center; padding: 2rem; color: var(--text-muted); font-size: 0.95rem; font-style: italic; }
    </style>
</head>
<body>

    <nav>
        <h1>ABC<span>Logistics</span></h1>
        <div class="nav-links">
            <a href="index.html" class="active">Dashboard</a>
            <a href="about.html">Developer Profile</a>
        </div>
    </nav>

    <div class="container">
        <div class="grid">
            <div class="card">
                <h2>Add Inventory Item</h2>
                <div id="errorMsg" class="error"></div>
                <div class="form-group">
                    <label>Item Name</label>
                    <input type="text" id="itemName" placeholder="e.g. Wireless Mouse">
                </div>
                <div class="form-group">
                    <label>Quantity</label>
                    <input type="number" id="itemQty" min="0" placeholder="0">
                </div>
                <div class="form-group">
                    <label>Unit Price ($)</label>
                    <input type="number" id="itemPrice" min="0" step="0.01" placeholder="0.00">
                </div>
                <button onclick="addItem()">Add to Inventory</button>
                <button class="btn-danger" onclick="clearAll()">Clear All Data</button>
            </div>

            <div class="card">
                <h2>Stock Visualization</h2>
                <canvas id="inventoryChart"></canvas>
            </div>
        </div>

        <div class="card" style="margin-top: 2rem;">
            <h2>Current Inventory Ledger</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Item Name</th>
                            <th>Qty in Stock</th>
                            <th>Unit Price</th>
                            <th>Total Value</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryTableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let inventory = JSON.parse(localStorage.getItem('abc_inventory')) || [];
        let chartInstance = null;

        const formatCurrency = (amount) => {
            return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(amount);
        };

        function updateUI() {
            const tbody = document.getElementById('inventoryTableBody');
            tbody.innerHTML = '';
            
            let labels = [];
            let quantities = [];

            if (inventory.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="empty-state">No items currently in inventory. Add an item above to get started.</td></tr>`;
            } else {
                inventory.forEach(item => {
                    const totalValue = item.qty * item.price;
                    
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td style="font-weight: 500;">${item.name}</td>
                        <td>${item.qty}</td>
                        <td>${formatCurrency(item.price)}</td>
                        <td style="font-weight: 600; color: var(--accent);">${formatCurrency(totalValue)}</td>
                    `;
                    tbody.appendChild(tr);

                    labels.push(item.name);
                    quantities.push(item.qty);
                });
            }

            renderChart(labels, quantities);
        }

        function addItem() {
            const name = document.getElementById('itemName').value.trim();
            const qty = parseFloat(document.getElementById('itemQty').value);
            const price = parseFloat(document.getElementById('itemPrice').value);
            const errorMsg = document.getElementById('errorMsg');

            if (!name || isNaN(qty) || isNaN(price)) {
                showError("Please fill out all fields with valid information.");
                return;
            }
            if (qty < 0 || price < 0) {
                showError("Inventory quantities and prices cannot be negative.");
                return;
            }
            if (inventory.some(item => item.name.toLowerCase() === name.toLowerCase())) {
                showError(`"${name}" already exists. Please update or remove the existing entry.`);
                return;
            }

            errorMsg.style.display = 'none';

            inventory.push({ name, qty, price });
            localStorage.setItem('abc_inventory', JSON.stringify(inventory));
            
            document.getElementById('itemName').value = '';
            document.getElementById('itemQty').value = '';
            document.getElementById('itemPrice').value = '';

            updateUI();
        }

        function clearAll() {
            if(inventory.length > 0 && confirm("Warning: This will permanently delete all inventory records. Proceed?")) {
                inventory = [];
                localStorage.removeItem('abc_inventory');
                updateUI();
            }
        }

        function showError(msg) {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
        }

        function renderChart(labels, data) {
            const ctx = document.getElementById('inventoryChart').getContext('2d');
            
            if (chartInstance) {
                chartInstance.destroy();
            }

            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Units in Stock',
                        data: data,
                        backgroundColor: '#3e8ed0', 
                        borderColor: '#2178c0',     
                        borderWidth: 1,
                        borderRadius: 4,
                        hoverBackgroundColor: '#2178c0'
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: { beginAtZero: true, ticks: { color: '#627d98', font: {family: 'Inter'} }, grid: { color: '#d9e2ec', drawBorder: false } }, 
                        x: { ticks: { color: '#627d98', font: {family: 'Inter'} }, grid: { display: false } }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#102a43',
                            titleFont: { family: 'Inter', size: 13 },
                            bodyFont: { family: 'Inter', size: 13 },
                            padding: 10,
                            displayColors: false
                        }
                    }
                }
            });
        }

        updateUI();
    </script>
</body>
</html>
